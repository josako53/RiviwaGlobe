# ┌─────────────────────────────────────────────────────────────────────────┐
# │  SERVICE  :  feedback_service                                           │
# │  API PORT :  8090                                                       │
# │  DATABASE :  feedback_db                                                │
# │  DB PORT  :  5434:5432 (host:container)                                 │
# │  FILE     :  alembic.ini                                                  │
# └─────────────────────────────────────────────────────────────────────────┘
# alembic.ini
# ═══════════════════════════════════════════════════════════════════════════════
# Alembic configuration for feedback_service.
#
# Usage
# ──────
#   # Apply all pending migrations:
#   alembic upgrade head
#
#   # Roll back one revision:
#   alembic downgrade -1
#
#   # Generate a new auto-migration after changing a model:
#   alembic revision --autogenerate -m "add_column_users_avatar_url"
#
#   # Show current revision in the DB:
#   alembic current
#
#   # Show full migration history:
#   alembic history --verbose
#
# Connection URL
# ──────────────
#   The sqlalchemy.url below is the FALLBACK used when running alembic
#   directly from the command line (e.g. local dev, CI pipelines).
#
#   In production the URL is overridden programmatically inside
#   alembic/env.py via settings.SYNC_DATABASE_URL so that credentials
#   are always read from environment variables — never from this file.
#
#   Format: postgresql+psycopg://<user>:<password>@<host>:<port>/<dbname>
#   Driver: psycopg v3 (psycopg[binary]) — matches SYNC_DATABASE_URL in config.py
# ═══════════════════════════════════════════════════════════════════════════════

[alembic]

# ── Migration script location ────────────────────────────────────────────────
script_location = alembic

# ── Migration file naming ─────────────────────────────────────────────────────
# Format: YYYY-MM-DD_HH-MM_<slug>.py  e.g. 2025-01-15_14-30_add_users_table.py
# Makes migrations sortable by date in the filesystem.
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(hour).2d-%%(minute).2d_%%(slug)s

# ── Prepend sys.path ──────────────────────────────────────────────────────────
# Ensures alembic can import app modules (models, config) when invoked from
# the project root.  Add the service root so bare imports resolve correctly.
prepend_sys_path = .

# ── Timezone ──────────────────────────────────────────────────────────────────
# Timestamps in migration files use UTC.
timezone = UTC

# ── Fallback database URL ─────────────────────────────────────────────────────
# Overridden at runtime by alembic/env.py reading settings.SYNC_DATABASE_URL.
# Change these defaults to match your local dev environment, or set the
# AUTH_DB_* environment variables and let env.py handle it.
sqlalchemy.url = postgresql+psycopg://feedback_admin:feedback_pass_456@localhost:5434/feedback_db


# ── Logging ───────────────────────────────────────────────────────────────────
# Controls what Alembic itself logs during migration runs.
# Set level to WARNING in production to suppress INFO noise in CI logs.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level     = WARNING
handlers  = console
qualname  =

[logger_sqlalchemy]
level     = WARNING
handlers  =
qualname  = sqlalchemy.engine
# Set to INFO to log every SQL statement executed during migrations (verbose).
# Useful when debugging a failing migration; leave WARNING in normal use.

[logger_alembic]
level     = INFO
handlers  =
qualname  = alembic

[handler_console]
class     = StreamHandler
args      = (sys.stderr,)
level     = NOTSET
formatter = generic

[formatter_generic]
format    = %(levelname)-5.5s [%(name)s] %(message)s
datefmt   = %H:%M:%S
