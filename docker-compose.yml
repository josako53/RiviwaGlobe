services:
  # ── KAFKA — KRaft mode (3 controller+broker nodes + 1 dedicated broker) ──
  kafka-1:
    image: apache/kafka:4.1.1
    container_name: kafka-1
    init: true
    restart: always
    ports: ["9092:9092"]
    networks: [riviwa-net]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'controller,broker'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-1:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      CLUSTER_ID: '5L6g3nShT-eMCtK--X86sw'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-3}
      KAFKA_DEFAULT_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-3}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-3}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_MIN_ISR:-2}
      KAFKA_MIN_INSYNC_REPLICAS: ${KAFKA_MIN_ISR:-2}
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_BROKER_SESSION_TIMEOUT_MS: 30000
      KAFKA_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS: 10000
      KAFKA_CONTROLLER_QUORUM_REQUEST_TIMEOUT_MS: 10000
    volumes: [kafka_1_data:/var/lib/kafka/data]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 15s
      retries: 30
      start_period: 300s

  kafka-2:
    image: apache/kafka:4.1.1
    container_name: kafka-2
    init: true
    restart: always
    ports: ["9093:9092"]
    networks: [riviwa-net]
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: 'controller,broker'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-2:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      CLUSTER_ID: '5L6g3nShT-eMCtK--X86sw'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-3}
      KAFKA_DEFAULT_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-3}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-3}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_MIN_ISR:-2}
      KAFKA_MIN_INSYNC_REPLICAS: ${KAFKA_MIN_ISR:-2}
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_BROKER_SESSION_TIMEOUT_MS: 30000
      KAFKA_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS: 10000
      KAFKA_CONTROLLER_QUORUM_REQUEST_TIMEOUT_MS: 10000
    volumes: [kafka_2_data:/var/lib/kafka/data]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 15s
      retries: 30
      start_period: 300s

  kafka-3:
    image: apache/kafka:4.1.1
    container_name: kafka-3
    init: true
    restart: always
    ports: ["9094:9092"]
    networks: [riviwa-net]
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: 'controller,broker'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-3:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      CLUSTER_ID: '5L6g3nShT-eMCtK--X86sw'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-3}
      KAFKA_DEFAULT_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-3}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-3}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_MIN_ISR:-2}
      KAFKA_MIN_INSYNC_REPLICAS: ${KAFKA_MIN_ISR:-2}
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_BROKER_SESSION_TIMEOUT_MS: 30000
      KAFKA_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS: 10000
      KAFKA_CONTROLLER_QUORUM_REQUEST_TIMEOUT_MS: 10000
    volumes: [kafka_3_data:/var/lib/kafka/data]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 15s
      retries: 30
      start_period: 300s

  kafka-4:
    image: apache/kafka:4.1.1
    container_name: kafka-4
    init: true
    restart: always
    ports: ["9095:9092"]
    networks: [riviwa-net]
    environment:
      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: 'broker'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-4:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      CLUSTER_ID: '5L6g3nShT-eMCtK--X86sw'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-3}
      KAFKA_DEFAULT_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-3}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-3}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_MIN_ISR:-2}
      KAFKA_MIN_INSYNC_REPLICAS: ${KAFKA_MIN_ISR:-2}
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_BROKER_SESSION_TIMEOUT_MS: 30000
      KAFKA_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS: 10000
      KAFKA_CONTROLLER_QUORUM_REQUEST_TIMEOUT_MS: 10000
    volumes: [kafka_4_data:/var/lib/kafka/data]
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 15s
      retries: 30
      start_period: 300s

  # ── DATABASES ─────────────────────────────────────────────────────────────
  riviwa_auth_db:
    image: postgres:15-alpine
    container_name: riviwa_auth_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports: ["5433:5432"]
    volumes: [auth_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  feedback_db:
    image: postgres:15-alpine
    container_name: feedback_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER: ${FEEDBACK_DB_USER}
      POSTGRES_PASSWORD: ${FEEDBACK_DB_PASSWORD}
      POSTGRES_DB: ${FEEDBACK_DB_NAME}
    ports: ["5434:5432"]
    volumes: [feedback_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FEEDBACK_DB_USER} -d ${FEEDBACK_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  stakeholder_db:
    image: postgres:15-alpine
    container_name: stakeholder_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER: ${STAKEHOLDER_DB_USER}
      POSTGRES_PASSWORD: ${STAKEHOLDER_DB_PASSWORD}
      POSTGRES_DB: ${STAKEHOLDER_DB_NAME}
    ports: ["5436:5432"]
    volumes: [stakeholder_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAKEHOLDER_DB_USER} -d ${STAKEHOLDER_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  payment_db:
    image: postgres:15-alpine
    container_name: payment_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER: ${PAYMENT_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}
      POSTGRES_DB: ${PAYMENT_DB_NAME}
    ports: ["5435:5432"]
    volumes: [payment_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER} -d ${PAYMENT_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── [NEW] NOTIFICATION DB ─────────────────────────────────────────────────
  notification_db:
    image: postgres:15-alpine
    container_name: notification_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER: ${NOTIFICATION_DB_USER:-notif_admin}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD:-notif_pass_789}
      POSTGRES_DB: ${NOTIFICATION_DB_NAME:-notification_db}
    ports: ["5437:5432"]
    volumes: [notification_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATION_DB_USER:-notif_admin} -d ${NOTIFICATION_DB_NAME:-notification_db}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── REDIS ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["6379:6379"]
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MICROSERVICES ─────────────────────────────────────────────────────────
  riviwa_auth_service:
    build:
      context: ./riviwa_auth_service
      dockerfile: Dockerfile
    container_name: riviwa_auth_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8000:8000"]
    environment:
      # Database
      AUTH_DB_HOST: ${AUTH_DB_HOST}
      DB_PORT: ${DB_PORT}
      AUTH_DB_USER: ${AUTH_DB_USER}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      AUTH_DB_NAME: ${AUTH_DB_NAME}
      # JWT — auth service SIGNS tokens so it uses SECRET_KEY / ALGORITHM
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      # OTP
      OTP_LOGIN_TTL_SECONDS: ${OTP_LOGIN_TTL_SECONDS}
      OTP_PASSWORD_RESET_TTL_SECONDS: ${OTP_PASSWORD_RESET_TTL_SECONDS}
      OTP_REGISTRATION_TTL_SECONDS: ${OTP_REGISTRATION_TTL_SECONDS}
      OTP_STANDALONE_TTL_SECONDS: ${OTP_STANDALONE_TTL_SECONDS}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS}
      OTP_RESEND_LIMIT: ${OTP_RESEND_LIMIT}
      # Lockout
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS}
      LOCKOUT_DURATION_MINUTES: ${LOCKOUT_DURATION_MINUTES}
      # Notifications (OTP delivery — handled by auth_service directly)
      OTP_SMS_PROVIDER: ${OTP_SMS_PROVIDER}
      OTP_EMAIL_PROVIDER: ${OTP_EMAIL_PROVIDER}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_VERIFY_SERVICE_SID: ${TWILIO_VERIFY_SERVICE_SID}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      # Infrastructure
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      # Service-to-service
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      # Admin seed
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      # Runtime
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG}
    depends_on:
      kafka-1:
        condition: service_healthy
      riviwa_auth_db:
        condition: service_healthy
      redis:
        condition: service_healthy

  stakeholder_service:
    build:
      context: ./stakeholder_service
      dockerfile: Dockerfile
    container_name: stakeholder_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8070:8070"]
    environment:
      # Database
      STAKEHOLDER_DB_HOST: ${STAKEHOLDER_DB_HOST}
      DB_PORT: ${DB_PORT}
      STAKEHOLDER_DB_USER: ${STAKEHOLDER_DB_USER}
      STAKEHOLDER_DB_PASSWORD: ${STAKEHOLDER_DB_PASSWORD}
      STAKEHOLDER_DB_NAME: ${STAKEHOLDER_DB_NAME}
      # JWT — other services VERIFY tokens so they use AUTH_SECRET_KEY / AUTH_ALGORITHM
      AUTH_SECRET_KEY: ${SECRET_KEY}
      AUTH_ALGORITHM: ${ALGORITHM}
      # Infrastructure
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      # Runtime
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG}
    depends_on:
      kafka-1:
        condition: service_healthy
      stakeholder_db:
        condition: service_healthy
      redis:
        condition: service_healthy

  feedback_service:
    build:
      context: ./feedback_service
      dockerfile: Dockerfile
    container_name: feedback_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8090:8090"]
    environment:
      # Database
      FEEDBACK_DB_HOST: ${FEEDBACK_DB_HOST}
      DB_PORT: ${DB_PORT}
      FEEDBACK_DB_USER: ${FEEDBACK_DB_USER}
      FEEDBACK_DB_PASSWORD: ${FEEDBACK_DB_PASSWORD}
      FEEDBACK_DB_NAME: ${FEEDBACK_DB_NAME}
      # JWT — other services VERIFY tokens so they use AUTH_SECRET_KEY / AUTH_ALGORITHM
      AUTH_SECRET_KEY: ${SECRET_KEY}
      AUTH_ALGORITHM: ${ALGORITHM}
      # Infrastructure
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      # Service-to-service
      AUTH_SERVICE_URL: http://riviwa_auth_service:8000
      AI_SERVICE_URL:   http://ai_service:8085
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      # Admin seed
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      # Runtime
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG}
      # ── Voice / Audio pipeline ──────────────────────────────────────────
      STT_PROVIDER_ORDER: ${STT_PROVIDER_ORDER:-whisper,google_stt}
      WHISPER_MODE: ${WHISPER_MODE:-api}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-medium}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_STT_API_KEY: ${GOOGLE_STT_API_KEY:-}
      AZURE_STT_KEY: ${AZURE_STT_KEY:-}
      AZURE_STT_REGION: ${AZURE_STT_REGION:-eastus}
      TTS_PROVIDER: ${TTS_PROVIDER:-google_tts}
      GOOGLE_TTS_API_KEY: ${GOOGLE_TTS_API_KEY:-}
      AZURE_TTS_KEY: ${AZURE_TTS_KEY:-}
      AZURE_TTS_REGION: ${AZURE_TTS_REGION:-eastus}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_DEFAULT_VOICE_ID: ${ELEVENLABS_DEFAULT_VOICE_ID:-21m00Tcm4TlvDq8ikWAM}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      VOICE_STORAGE_BUCKET: ${VOICE_STORAGE_BUCKET:-riviwa-voice}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v18.0}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-riviwa_webhook_verify_change_me}
    depends_on:
      kafka-1:
        condition: service_healthy
      feedback_db:
        condition: service_healthy
      minio:
        condition: service_healthy

  payment_service:
    build:
      context: ./payment
      dockerfile: Dockerfile
    container_name: payment_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8040:8040"]
    environment:
      # Database
      DATABASE_URL: ${PAYMENT_DATABASE_URL}
      # JWT — other services VERIFY tokens so they use AUTH_SECRET_KEY / AUTH_ALGORITHM
      AUTH_SECRET_KEY: ${SECRET_KEY}
      AUTH_ALGORITHM: ${ALGORITHM}
      # Infrastructure
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      # Payment providers
      AZAMPAY_CLIENT_ID: ${AZAMPAY_CLIENT_ID}
      AZAMPAY_CLIENT_SECRET: ${AZAMPAY_CLIENT_SECRET}
      SELCOM_API_KEY: ${SELCOM_API_KEY}
      SELCOM_API_SECRET: ${SELCOM_API_SECRET}
      SELCOM_VENDOR: ${SELCOM_VENDOR}
      MPESA_API_KEY: ${MPESA_API_KEY}
      MPESA_PUBLIC_KEY: ${MPESA_PUBLIC_KEY}
      MPESA_SERVICE_PROVIDER_CODE: ${MPESA_SERVICE_PROVIDER_CODE}
      PAYPAL_CLIENT_ID:     ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      PAYPAL_WEBHOOK_ID:    ${PAYPAL_WEBHOOK_ID:-}
      PAYPAL_SANDBOX:       ${PAYPAL_SANDBOX:-false}
      AIRTEL_CLIENT_ID:          ${AIRTEL_CLIENT_ID:-}
      AIRTEL_CLIENT_SECRET:      ${AIRTEL_CLIENT_SECRET:-}
      AIRTEL_SANDBOX:            ${AIRTEL_SANDBOX:-true}
      AIRTEL_DISBURSEMENT_PIN:   ${AIRTEL_DISBURSEMENT_PIN:-}
      AIRTEL_PUBLIC_KEY:         ${AIRTEL_PUBLIC_KEY:-}
      YAS_CLIENT_ID:        ${YAS_CLIENT_ID:-}
      YAS_CLIENT_SECRET:    ${YAS_CLIENT_SECRET:-}
      YAS_MERCHANT_CODE:    ${YAS_MERCHANT_CODE:-}
      YAS_SANDBOX:          ${YAS_SANDBOX:-true}
      PAYMENT_CALLBACK_BASE_URL: ${PAYMENT_CALLBACK_BASE_URL}
      # Runtime
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG}
    depends_on:
      kafka-1:
        condition: service_healthy
      payment_db:
        condition: service_healthy

  # ── [NEW] NOTIFICATION SERVICE ────────────────────────────────────────────
  # Handles all push, SMS, WhatsApp, email, and in-app notification delivery.
  # Source services (auth, feedback, stakeholder, payment) publish to the
  # riviwa.notifications Kafka topic. This service delivers them.
  # Ignorant of business logic — only handles HOW to deliver notifications.
  notification_service:
    build:
      context: ./notification_service
      dockerfile: Dockerfile
    container_name: notification_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8060:8060"]
    environment:
      # Database (dedicated notification_db — isolated from other services)
      NOTIFICATION_DB_HOST: notification_db
      DB_PORT: 5432
      NOTIFICATION_DB_USER: ${NOTIFICATION_DB_USER:-notif_admin}
      NOTIFICATION_DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD:-notif_pass_789}
      NOTIFICATION_DB_NAME: ${NOTIFICATION_DB_NAME:-notification_db}
      # Infrastructure
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      # Redis — DB 3 (isolated from auth on DB 0, never conflicts)
      REDIS_URL: ${NOTIFICATION_REDIS_URL:-redis://redis:6379/3}
      # Service-to-service auth (same shared secret as other services)
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      # JWT — notification_service verifies tokens issued by auth_service
      AUTH_SECRET_KEY: ${SECRET_KEY}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM:-HS256}
      # Runtime
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG:-false}
      # ── Push — Firebase Cloud Messaging (Android / Web) ──────────────────
      FCM_SERVICE_ACCOUNT_JSON: ${FCM_SERVICE_ACCOUNT_JSON:-}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      # ── Push — Apple Push Notification service (iOS) ─────────────────────
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_AUTH_KEY: ${APNS_AUTH_KEY:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-com.riviwa.app}
      APNS_USE_SANDBOX: ${APNS_USE_SANDBOX:-false}
      # ── SMS — Africa's Talking (primary provider for Tanzania / East Africa)
      AT_API_KEY: ${AT_API_KEY:-}
      AT_USERNAME: ${AT_USERNAME:-sandbox}
      AT_SENDER_ID: ${AT_SENDER_ID:-RIVIWA}
      # ── SMS — Twilio (fallback when Africa's Talking fails) ───────────────
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      # ── WhatsApp — Meta Cloud API ─────────────────────────────────────────
      META_WHATSAPP_TOKEN: ${META_WHATSAPP_TOKEN:-}
      META_WHATSAPP_PHONE_ID: ${META_WHATSAPP_PHONE_ID:-}
      # ── Email — SendGrid (primary) ────────────────────────────────────────
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@riviwa.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Riviwa Platform}
      # ── Email — SMTP (fallback when SendGrid fails) ───────────────────────
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      # ── Retry / rate-limit config ─────────────────────────────────────────
      MAX_RETRIES: ${NOTIFICATION_MAX_RETRIES:-3}
      RETRY_BASE_DELAY_SEC: ${NOTIFICATION_RETRY_BASE_DELAY:-60}
      RETRY_BACKOFF_FACTOR: ${NOTIFICATION_RETRY_BACKOFF:-2.0}
      RATE_LIMIT_MAX: ${NOTIFICATION_RATE_LIMIT_MAX:-5}
      RATE_LIMIT_WINDOW_SEC: ${NOTIFICATION_RATE_LIMIT_WINDOW:-3600}
    depends_on:
      kafka-1:
        condition: service_healthy
      notification_db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── TRANSLATION DB ─────────────────────────────────────────────────────────
  translation_db:
    image: postgres:15-alpine
    container_name: translation_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER:     ${TRANSLATION_DB_USER:-trans_admin}
      POSTGRES_PASSWORD: ${TRANSLATION_DB_PASSWORD:-trans_pass_321}
      POSTGRES_DB:       ${TRANSLATION_DB_NAME:-translation_db}
    ports: ["5438:5432"]
    volumes: [translation_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TRANSLATION_DB_USER:-trans_admin} -d ${TRANSLATION_DB_NAME:-translation_db}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── TRANSLATION SERVICE ───────────────────────────────────────────────────
  # Multilingual translation and language detection. NLLB-200 runs locally.
  # Called on-demand via HTTP by other services — does NOT consume from Kafka.
  translation_service:
    build:
      context: ./translation_service
      dockerfile: Dockerfile
    container_name: translation_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8050:8050"]
    volumes:
      - ./models/nllb:/models/nllb
    environment:
      TRANSLATION_DB_HOST:     translation_db
      DB_PORT:                 5432
      TRANSLATION_DB_USER:     ${TRANSLATION_DB_USER:-trans_admin}
      TRANSLATION_DB_PASSWORD: ${TRANSLATION_DB_PASSWORD:-trans_pass_321}
      TRANSLATION_DB_NAME:     ${TRANSLATION_DB_NAME:-translation_db}
      REDIS_URL:            ${REDIS_URL:-redis://redis:6379/4}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG:       ${DEBUG}
      TRANSLATION_PROVIDER:            ${TRANSLATION_PROVIDER:-nllb}
      GOOGLE_PROJECT_ID:               ${GOOGLE_PROJECT_ID:-}
      GOOGLE_APPLICATION_CREDENTIALS:  ${GOOGLE_APPLICATION_CREDENTIALS:-}
      DEEPL_API_KEY:                   ${DEEPL_API_KEY:-}
      DEEPL_FREE_TIER:                 ${DEEPL_FREE_TIER:-true}
      MICROSOFT_TRANSLATOR_KEY:        ${MICROSOFT_TRANSLATOR_KEY:-}
      MICROSOFT_TRANSLATOR_REGION:     ${MICROSOFT_TRANSLATOR_REGION:-eastus}
      LIBRE_TRANSLATE_URL:             ${LIBRE_TRANSLATE_URL:-http://libretranslate:5000}
      LIBRE_TRANSLATE_API_KEY:         ${LIBRE_TRANSLATE_API_KEY:-}
      NLLB_ENABLED:    ${NLLB_ENABLED:-true}
      NLLB_MODEL_NAME: ${NLLB_MODEL_NAME:-facebook/nllb-200-distilled-1.3B}
      NLLB_MODEL_DIR:  /models/nllb
      NLLB_DEVICE:     ${NLLB_DEVICE:-cpu}
      NLLB_WORKERS:    ${NLLB_WORKERS:-2}
      NLLB_MAX_LENGTH: ${NLLB_MAX_LENGTH:-512}
      DEFAULT_LANGUAGE:  ${DEFAULT_LANGUAGE:-sw}
      FALLBACK_LANGUAGE: ${FALLBACK_LANGUAGE:-en}
      GROQ_API_KEY:              ${GROQ_API_KEY:-}
      GROQ_TRANSLATION_MODEL:    ${GROQ_TRANSLATION_MODEL:-llama-3.3-70b-versatile}
      GROQ_BASE_URL:             ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
    depends_on:
      translation_db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── RECOMMENDATION DB (PostGIS) ────────────────────────────────────────────
  recommendation_db:
    image: postgis/postgis:15-3.4-alpine
    container_name: recommendation_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER:     ${RECOMMENDATION_DB_USER:-rec_admin}
      POSTGRES_PASSWORD: ${RECOMMENDATION_DB_PASSWORD:-rec_pass_321}
      POSTGRES_DB:       ${RECOMMENDATION_DB_NAME:-recommendation_db}
    ports: ["5439:5432"]
    volumes: [recommendation_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RECOMMENDATION_DB_USER:-rec_admin} -d ${RECOMMENDATION_DB_NAME:-recommendation_db}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── QDRANT (Vector DB) ───────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: qdrant
    init: true
    restart: always
    networks: [riviwa-net]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes: [qdrant_data:/qdrant/storage]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── RECOMMENDATION SERVICE ──────────────────────────────────────────────────
  recommendation_service:
    build:
      context: ./recommendation_service
      dockerfile: Dockerfile
    container_name: recommendation_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8055:8055"]
    volumes:
      - ./models/sentence-transformers:/models/sentence-transformers
    environment:
      RECOMMENDATION_DB_HOST:     recommendation_db
      DB_PORT:                    5432
      RECOMMENDATION_DB_USER:     ${RECOMMENDATION_DB_USER:-rec_admin}
      RECOMMENDATION_DB_PASSWORD: ${RECOMMENDATION_DB_PASSWORD:-rec_pass_321}
      RECOMMENDATION_DB_NAME:     ${RECOMMENDATION_DB_NAME:-recommendation_db}
      REDIS_URL:               ${REDIS_URL:-redis://redis:6379/5}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      AUTH_SECRET_KEY:         ${AUTH_SECRET_KEY:-${SECRET_KEY}}
      AUTH_ALGORITHM:          ${AUTH_ALGORITHM:-${ALGORITHM:-HS256}}
      INTERNAL_SERVICE_KEY:    ${INTERNAL_SERVICE_KEY}
      QDRANT_HOST:             qdrant
      QDRANT_PORT:             6333
      EMBEDDING_MODEL:         ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      ENVIRONMENT:             ${ENVIRONMENT}
      DEBUG:                   ${DEBUG}
      WEIGHT_SEMANTIC:         ${WEIGHT_SEMANTIC:-0.35}
      WEIGHT_TAG_OVERLAP:      ${WEIGHT_TAG_OVERLAP:-0.25}
      WEIGHT_GEO_PROXIMITY:    ${WEIGHT_GEO_PROXIMITY:-0.25}
      WEIGHT_RECENCY:          ${WEIGHT_RECENCY:-0.15}
    depends_on:
      recommendation_db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── AI Service — Riviwa AI conversation engine ───────────────────────────────
  ai_db:
    image: postgres:15-alpine
    container_name: ai_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER: ${AI_DB_USER:-ai_admin}
      POSTGRES_PASSWORD: ${AI_DB_PASSWORD:-ai_pass_789}
      POSTGRES_DB: ${AI_DB_NAME:-ai_db}
    ports: ["5440:5432"]
    volumes: [ai_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AI_DB_USER:-ai_admin} -d ${AI_DB_NAME:-ai_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: ai_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8085:8085"]
    volumes:
      - ./models/sentence-transformers:/models/sentence-transformers
      - ./obsidian_vault:/opt/riviwa/obsidian_vault:ro
    environment:
      # Database
      AI_DB_HOST:     ai_db
      DB_PORT:        5432
      AI_DB_USER:     ${AI_DB_USER:-ai_admin}
      AI_DB_PASSWORD: ${AI_DB_PASSWORD:-ai_pass_789}
      AI_DB_NAME:     ${AI_DB_NAME:-ai_db}
      # JWT
      AUTH_SECRET_KEY: ${SECRET_KEY}
      AUTH_ALGORITHM:  ${ALGORITHM:-HS256}
      # Infrastructure
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      # Service-to-service
      INTERNAL_SERVICE_KEY:    ${INTERNAL_SERVICE_KEY}
      FEEDBACK_SERVICE_URL:    http://feedback_service:8090
      AUTH_SERVICE_URL:        http://riviwa_auth_service:8000
      STAKEHOLDER_SERVICE_URL: http://stakeholder_service:8070
      # Qdrant vector DB
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      # Embedding
      EMBEDDING_MODEL:      ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      EMBEDDING_MODEL_PATH: /models/sentence-transformers
      # WhatsApp
      WHATSAPP_ACCESS_TOKEN:    ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_API_VERSION:     ${WHATSAPP_API_VERSION:-v18.0}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_VERIFY_TOKEN:    ${WHATSAPP_VERIFY_TOKEN:-riviwa_ai_webhook_verify}
      # STT
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # MinIO
      MINIO_ENDPOINT:        http://minio:9000
      MINIO_ACCESS_KEY:      ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY:      ${MINIO_SECRET_KEY:-minioadmin}
      VOICE_STORAGE_BUCKET:  ${VOICE_STORAGE_BUCKET:-riviwa-voice}
      # Groq LLM (optional — replaces local Ollama for chat if key is set)
      GROQ_API_KEY:  ${GROQ_API_KEY:-}
      GROQ_MODEL:    ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      # Runtime
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG:       ${DEBUG}
    depends_on:
      ai_db:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ── KAFKA UI ──────────────────────────────────────────────────────────────
  kafka-ui:
    image: kafbat/kafka-ui:v1.4.2
    container_name: kafka-ui
    init: true
    restart: always
    ports: ["8080:8080"]
    networks: [riviwa-net]
    environment:
      KAFKA_CLUSTERS_0_NAME: riviwa-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      DYNAMIC_CONFIG_ENABLED: 'true'
    depends_on:
      kafka-1:
        condition: service_healthy

  # ── MinIO — Object Storage ────────────────────────────────────────────────
  minio:
    image: alpine/minio:RELEASE.2025-10-15T17-29-55Z
    container_name: minio
    init: true
    restart: always
    networks: [riviwa-net]
    user: "0:0"
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web console (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── MinIO bucket initialiser — runs once on first `docker compose up` ─────
  # Creates both required buckets: voice recordings + project/progress images.
  # Uses --ignore-existing so re-running compose up never fails on existing buckets.
  minio_init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: minio_init
    networks: [riviwa-net]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      VOICE_STORAGE_BUCKET: ${VOICE_STORAGE_BUCKET:-riviwa-voice}
      IMAGE_STORAGE_BUCKET: ${IMAGE_STORAGE_BUCKET:-riviwa-images}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        mc mb --ignore-existing local/$$VOICE_STORAGE_BUCKET;
        mc anonymous set none local/$$VOICE_STORAGE_BUCKET;
        echo 'Bucket $$VOICE_STORAGE_BUCKET is ready.';
        mc mb --ignore-existing local/$$IMAGE_STORAGE_BUCKET;
        mc anonymous set none local/$$IMAGE_STORAGE_BUCKET;
        echo 'Bucket $$IMAGE_STORAGE_BUCKET is ready.';
        mc mb --ignore-existing local/riviwa-qr-codes;
        mc anonymous set none local/riviwa-qr-codes;
        echo 'Bucket riviwa-qr-codes is ready.';
        mc mb --ignore-existing local/riviwa-verification;
        mc anonymous set none local/riviwa-verification;
        echo 'Bucket riviwa-verification is ready.';
      "
    restart: "no"

  # ── ANALYTICS DB ─────────────────────────────────────────────────────────
  analytics_db:
    image: postgres:15-alpine
    container_name: analytics_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER:     ${ANALYTICS_DB_USER:-analytics_admin}
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASSWORD:-analytics_pass_123}
      POSTGRES_DB:       ${ANALYTICS_DB_NAME:-analytics_db}
    ports: ["5441:5432"]
    volumes: [analytics_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ANALYTICS_DB_USER:-analytics_admin} -d ${ANALYTICS_DB_NAME:-analytics_db}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── ANALYTICS SERVICE ─────────────────────────────────────────────────────
  # Pre-computed and real-time analytics for the Riviwa GRM platform.
  # Reads from its own analytics_db AND from feedback_db (read-only).
  # No Kafka dependency — pulls data directly via SQL on request.
  analytics_service:
    build:
      context: ./analytics_service
      dockerfile: Dockerfile
    container_name: analytics_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8095:8095"]
    environment:
      # Own database
      ANALYTICS_DB_HOST:     analytics_db
      ANALYTICS_DB_PORT:     5432
      ANALYTICS_DB_USER:     ${ANALYTICS_DB_USER:-analytics_admin}
      ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD:-analytics_pass_123}
      ANALYTICS_DB_NAME:     ${ANALYTICS_DB_NAME:-analytics_db}
      # feedback_db (read-only cross-service analytics)
      FEEDBACK_DB_HOST:     feedback_db
      FEEDBACK_DB_PORT:     5432
      FEEDBACK_DB_USER:     ${FEEDBACK_DB_USER}
      FEEDBACK_DB_PASSWORD: ${FEEDBACK_DB_PASSWORD}
      FEEDBACK_DB_NAME:     ${FEEDBACK_DB_NAME}
      # waiting_db (read-only cross-service analytics — staff performance)
      WAITING_DB_HOST:     waiting_db
      WAITING_DB_PORT:     5432
      WAITING_DB_USER:     ${WAITING_DB_USER:-waiting_admin}
      WAITING_DB_PASSWORD: ${WAITING_DB_PASSWORD:-waiting_pass_130}
      WAITING_DB_NAME:     ${WAITING_DB_NAME:-waiting_db}
      # JWT — verifies tokens issued by auth_service
      AUTH_SECRET_KEY: ${SECRET_KEY}
      AUTH_ALGORITHM:  ${ALGORITHM:-HS256}
      # Service-to-service
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      # Redis — DB 6 (isolated from all other services)
      REDIS_URL: redis://redis:6379/6
      # Groq AI Insights
      GROQ_API_KEY:  ${GROQ_API_KEY:-}
      GROQ_MODEL:    ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      # Runtime
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG:        ${DEBUG:-false}
    depends_on:
      analytics_db:
        condition: service_healthy
      feedback_db:
        condition: service_healthy
      waiting_db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── INTEGRATION DB ───────────────────────────────────────────────────────
  integration_db:
    image: postgres:15-alpine
    container_name: integration_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER:     ${INTEGRATION_DB_USER:-integration_admin}
      POSTGRES_PASSWORD: ${INTEGRATION_DB_PASSWORD:-integration_pass_999}
      POSTGRES_DB:       ${INTEGRATION_DB_NAME:-integration_db}
    ports: ["5442:5432"]
    volumes: [integration_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INTEGRATION_DB_USER:-integration_admin} -d ${INTEGRATION_DB_NAME:-integration_db}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── INTEGRATION SERVICE ───────────────────────────────────────────────────
  # Third-party integration: mini-app, web widget/tag, AI chatbot, OAuth2 PKCE,
  # API key management, webhook engine, external data bridge, mTLS for banks.
  integration_service:
    build:
      context: ./integration_service
      dockerfile: Dockerfile
    container_name: integration_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8100:8100"]
    environment:
      INTEGRATION_DB_HOST:     integration_db
      DB_PORT:                 5432
      INTEGRATION_DB_USER:     ${INTEGRATION_DB_USER:-integration_admin}
      INTEGRATION_DB_PASSWORD: ${INTEGRATION_DB_PASSWORD:-integration_pass_999}
      INTEGRATION_DB_NAME:     ${INTEGRATION_DB_NAME:-integration_db}
      AUTH_SECRET_KEY:         ${SECRET_KEY}
      AUTH_ALGORITHM:          ${ALGORITHM:-HS256}
      ENCRYPTION_KEY:          ${INTEGRATION_ENCRYPTION_KEY:-CHANGE_ME_32_BYTE_BASE64URL_KEY_HERE}
      INTERNAL_SERVICE_KEY:    ${INTERNAL_SERVICE_KEY}
      AUTH_SERVICE_URL:        http://riviwa_auth_service:8000
      FEEDBACK_SERVICE_URL:    http://feedback_service:8090
      REDIS_URL:               redis://redis:6379/7
      RIVIWA_WIDGET_BASE_URL:  ${RIVIWA_WIDGET_BASE_URL:-https://widget.riviwa.com}
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG:        ${DEBUG:-false}
    depends_on:
      integration_db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── PRODUCT DB ───────────────────────────────────────────────────────────────
  product_db:
    image: postgres:15-alpine
    container_name: product_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER:     ${PRODUCT_DB_USER:-product_admin}
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD:-product_pass_123}
      POSTGRES_DB:       ${PRODUCT_DB_NAME:-product_db}
    ports: ["5443:5432"]
    volumes: [product_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRODUCT_DB_USER:-product_admin} -d ${PRODUCT_DB_NAME:-product_db}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── PRODUCT SERVICE ───────────────────────────────────────────────────────────
  # Product catalogue: RSIN, product types, category attributes, org-scoped listings,
  # variation parent-child, flexible name-value attributes, Kafka lifecycle events.
  product_service:
    build:
      context: ./product_service
      dockerfile: Dockerfile
    container_name: product_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8110:8110"]
    environment:
      PRODUCT_DB_HOST:      product_db
      DB_PORT:              5432
      PRODUCT_DB_USER:      ${PRODUCT_DB_USER:-product_admin}
      PRODUCT_DB_PASSWORD:  ${PRODUCT_DB_PASSWORD:-product_pass_123}
      PRODUCT_DB_NAME:      ${PRODUCT_DB_NAME:-product_db}
      AUTH_SECRET_KEY:      ${SECRET_KEY}
      AUTH_ALGORITHM:       ${ALGORITHM:-HS256}
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      AUTH_SERVICE_URL:     http://riviwa_auth_service:8000
      AI_SERVICE_URL:       http://ai_service:8085
      REDIS_URL:            redis://redis:6379/8
      MINIO_ENDPOINT:       minio:9000
      MINIO_ACCESS_KEY:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY:     ${MINIO_SECRET_KEY:-minioadmin}
      IMAGES_BUCKET:        riviwa-images
      ENVIRONMENT:          ${ENVIRONMENT}
      DEBUG:                ${DEBUG:-false}
    depends_on:
      product_db:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── QR DB ────────────────────────────────────────────────────────────────
  qr_db:
    image: postgres:15-alpine
    container_name: qr_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER:     ${QR_DB_USER:-qr_admin}
      POSTGRES_PASSWORD: ${QR_DB_PASSWORD:-qr_pass_444}
      POSTGRES_DB:       ${QR_DB_NAME:-qr_db}
    ports: ["5444:5432"]
    volumes: [qr_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QR_DB_USER:-qr_admin} -d ${QR_DB_NAME:-qr_db}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── QR SERVICE ────────────────────────────────────────────────────────────
  # QR code generation, bulk product QR batches, SMS short codes, receipt sessions.
  # Called by integration_service (receipts), product_service (product QR).
  # Public scan endpoint redirects to the Riviwa feedback app.
  qr_service:
    build:
      context: ./qr_service
      dockerfile: Dockerfile
    container_name: qr_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8120:8120"]
    environment:
      QR_DB_HOST:     qr_db
      DB_PORT:        5432
      QR_DB_USER:     ${QR_DB_USER:-qr_admin}
      QR_DB_PASSWORD: ${QR_DB_PASSWORD:-qr_pass_444}
      QR_DB_NAME:     ${QR_DB_NAME:-qr_db}
      AUTH_SECRET_KEY:      ${SECRET_KEY}
      AUTH_ALGORITHM:       ${ALGORITHM:-HS256}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      MINIO_ENDPOINT:   http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      QR_BUCKET:        riviwa-qr-codes
      FEEDBACK_APP_URL: ${FEEDBACK_APP_URL:-https://riviwa-4b0b9.web.app}
      AI_SERVICE_URL:   http://ai_service:8085
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG:        ${DEBUG:-false}
    depends_on:
      qr_db:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka-1:
        condition: service_healthy

  # ── VERIFICATION DB ────────────────────────────────────────────────────────
  verification_db:
    image: postgres:15-alpine
    container_name: verification_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER:     ${VERIFICATION_DB_USER:-verification_admin}
      POSTGRES_PASSWORD: ${VERIFICATION_DB_PASSWORD:-verification_pass_445}
      POSTGRES_DB:       ${VERIFICATION_DB_NAME:-verification_db}
    ports: ["5445:5432"]
    volumes: [verification_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VERIFICATION_DB_USER:-verification_admin} -d ${VERIFICATION_DB_NAME:-verification_db}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── VERIFICATION SERVICE ──────────────────────────────────────────────────
  # QR/SMS code authenticity checks (AUTHENTIC/ALREADY_USED/UNRECOGNIZED).
  # Fake product reporting with GPS + photo + AI image analysis (CLIP + Llama 4 Scout).
  # Field agent management, fake report heatmap, verification stats.
  verification_service:
    build:
      context: ./verification_service
      dockerfile: Dockerfile
    container_name: verification_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8125:8125"]
    environment:
      VERIFICATION_DB_HOST:     verification_db
      DB_PORT:                  5432
      VERIFICATION_DB_USER:     ${VERIFICATION_DB_USER:-verification_admin}
      VERIFICATION_DB_PASSWORD: ${VERIFICATION_DB_PASSWORD:-verification_pass_445}
      VERIFICATION_DB_NAME:     ${VERIFICATION_DB_NAME:-verification_db}
      AUTH_SECRET_KEY:      ${SECRET_KEY}
      AUTH_ALGORITHM:       ${ALGORITHM:-HS256}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      QR_SERVICE_URL:       http://qr_service:8120
      PRODUCT_SERVICE_URL:  http://product_service:8110
      AI_SERVICE_URL:       http://ai_service:8085
      MINIO_ENDPOINT:   http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      VERIFICATION_BUCKET: riviwa-verification
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG:        ${DEBUG:-false}
    depends_on:
      verification_db:
        condition: service_healthy
      qr_service:
        condition: service_started
      minio:
        condition: service_healthy

  # ── Nginx reverse proxy + SSL termination ─────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    init: true
    restart: always
    networks: [riviwa-net]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - ./nginx/cors_params:/etc/nginx/cors_params:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - riviwa_auth_service
      - stakeholder_service
      - feedback_service
      - payment_service
      - notification_service
      - analytics_service
      - integration_service
      - product_service
      - qr_service
      - verification_service
      - waiting_service
      - staff_service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:80/ || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Certbot — auto-renew Let's Encrypt certificates ──────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    networks: [riviwa-net]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 43200 & wait $${!}; done"
    depends_on:
      - nginx

  # ── SPARK MASTER ──────────────────────────────────────────────────────────
  spark_master:
    image: apache/spark:3.5.3
    container_name: spark_master
    hostname: spark-master   # underscore in service name breaks Java URI; use hyphen
    init: true
    restart: always
    networks: [riviwa-net]
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8082"
    ports:
      - "8082:8082"   # Spark Web UI (8080 used by kafka-ui)
      - "7077:7077"   # Spark master port
    volumes:
      - spark_master_data:/opt/spark/work
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── SPARK WORKER ──────────────────────────────────────────────────────────
  spark_worker:
    image: apache/spark:3.5.3
    container_name: spark_worker
    init: true
    restart: always
    networks: [riviwa-net]
    user: root
    command: >
      bash -c "chmod 777 /opt/spark/work &&
               exec /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"
    environment:
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_WEBUI_PORT: "8081"
      SPARK_WORKER_CLEANUP_ENABLED: "true"
      SPARK_WORKER_CLEANUP_INTERVAL: "1800"
      SPARK_WORKER_CLEANUP_APP_DATA_TTL: "3600"
    volumes:
      - spark_worker_data:/opt/spark/work
    depends_on:
      spark_master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── SPARK JOBS ─────────────────────────────────────────────────────────────
  # Structured Streaming (SLA monitor, hotspot detector, live dashboard) and
  # batch jobs (historical analytics, staff analytics, ML escalation scoring).
  spark_jobs:
    build:
      context: ./spark_jobs
      dockerfile: Dockerfile
    container_name: spark_jobs
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      SPARK_MASTER: spark://spark-master:7077
      # feedback_db (read source for batch jobs)
      FEEDBACK_DB_HOST:     feedback_db
      FEEDBACK_DB_PORT:     5432
      FEEDBACK_DB_USER:     ${FEEDBACK_DB_USER}
      FEEDBACK_DB_PASSWORD: ${FEEDBACK_DB_PASSWORD}
      FEEDBACK_DB_NAME:     ${FEEDBACK_DB_NAME}
      # analytics_db (write target)
      ANALYTICS_DB_HOST:     analytics_db
      ANALYTICS_DB_PORT:     5432
      ANALYTICS_DB_USER:     ${ANALYTICS_DB_USER:-analytics_admin}
      ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD:-analytics_pass_123}
      ANALYTICS_DB_NAME:     ${ANALYTICS_DB_NAME:-analytics_db}
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      # Redis (DB 6)
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_SPARK_DB: "6"
    depends_on:
      spark_master:
        condition: service_healthy
      spark_worker:
        condition: service_healthy
      analytics_db:
        condition: service_healthy
      feedback_db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    volumes:
      - spark_checkpoints:/tmp/spark_checkpoints

  # ── WAITING DB ───────────────────────────────────────────────────────────────
  waiting_db:
    image: postgres:15-alpine
    container_name: waiting_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER:     ${WAITING_DB_USER:-waiting_admin}
      POSTGRES_PASSWORD: ${WAITING_DB_PASSWORD:-waiting_pass_130}
      POSTGRES_DB:       ${WAITING_DB_NAME:-waiting_db}
    ports: ["5448:5432"]
    volumes: [waiting_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAITING_DB_USER:-waiting_admin} -d ${WAITING_DB_NAME:-waiting_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── WAITING SERVICE ───────────────────────────────────────────────────────────
  waiting_service:
    build:
      context: ./waiting_service
      dockerfile: Dockerfile
    container_name: waiting_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8130:8130"]
    environment:
      WAITING_DB_HOST:     waiting_db
      DB_PORT:             5432
      WAITING_DB_USER:     ${WAITING_DB_USER:-waiting_admin}
      WAITING_DB_PASSWORD: ${WAITING_DB_PASSWORD:-waiting_pass_130}
      WAITING_DB_NAME:     ${WAITING_DB_NAME:-waiting_db}
      AUTH_SECRET_KEY:     ${SECRET_KEY}
      AUTH_ALGORITHM:      ${ALGORITHM:-HS256}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      REDIS_URL:           redis://redis:6379/9
      ENVIRONMENT:         ${ENVIRONMENT}
      DEBUG:               ${DEBUG:-false}
    depends_on:
      waiting_db:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── STAFF SERVICE ────────────────────────────────────────────────────────────
  staff_service:
    build:
      context: ./staff_service
      dockerfile: Dockerfile
    container_name: staff_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8135:8135"]
    environment:
      STAFF_DB_HOST:        staff_db
      DB_PORT:              5432
      STAFF_DB_USER:        ${STAFF_DB_USER:-staff_admin}
      STAFF_DB_PASSWORD:    ${STAFF_DB_PASSWORD:-staff_pass_135}
      STAFF_DB_NAME:        ${STAFF_DB_NAME:-staff_db}
      AUTH_SECRET_KEY:      ${SECRET_KEY}
      AUTH_ALGORITHM:       ${ALGORITHM:-HS256}
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      REDIS_URL:            redis://redis:6379/10
      MINIO_ENDPOINT:       minio:9000
      MINIO_ACCESS_KEY:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY:     ${MINIO_SECRET_KEY:-minioadmin}
      STAFF_BUCKET:         riviwa-staff
      ENVIRONMENT:          ${ENVIRONMENT}
      DEBUG:                ${DEBUG:-false}
    depends_on:
      staff_db:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  staff_db:
    image: postgres:15-alpine
    container_name: staff_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER:     ${STAFF_DB_USER:-staff_admin}
      POSTGRES_PASSWORD: ${STAFF_DB_PASSWORD:-staff_pass_135}
      POSTGRES_DB:       ${STAFF_DB_NAME:-staff_db}
    ports: ["5447:5432"]
    volumes: [staff_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAFF_DB_USER:-staff_admin} -d ${STAFF_DB_NAME:-staff_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── SUBSCRIPTION SERVICE ──────────────────────────────────────────────────
  subscription_service:
    build:
      context: ./subscription_service
      dockerfile: Dockerfile
    container_name: subscription_service
    init: true
    restart: always
    networks: [riviwa-net]
    ports: ["8140:8140"]
    environment:
      SUBSCRIPTION_DB_HOST:     subscription_db
      SUBSCRIPTION_DB_USER:     ${SUBSCRIPTION_DB_USER:-subscription_admin}
      SUBSCRIPTION_DB_PASSWORD: ${SUBSCRIPTION_DB_PASSWORD:-subscription_pass}
      SUBSCRIPTION_DB_NAME:     ${SUBSCRIPTION_DB_NAME:-subscription_db}
      AUTH_SECRET_KEY:          ${SECRET_KEY}
      AUTH_ALGORITHM:           ${ALGORITHM}
      INTERNAL_SERVICE_KEY:     ${INTERNAL_SERVICE_KEY}
      KAFKA_BOOTSTRAP_SERVERS:  ${KAFKA_BOOTSTRAP_SERVERS}
      AZAMPAY_APP_NAME:         ${AZAMPAY_APP_NAME:-Riviwa}
      AZAMPAY_CLIENT_ID:        ${AZAMPAY_CLIENT_ID:-}
      AZAMPAY_CLIENT_SECRET:    ${AZAMPAY_CLIENT_SECRET:-}
      AZAMPAY_BASE_URL:         ${AZAMPAY_BASE_URL:-https://authenticator.azampay.co.tz}
      AZAMPAY_CHECKOUT_URL:     ${AZAMPAY_CHECKOUT_URL:-https://checkout.azampay.co.tz}
      SELCOM_BASE_URL:          ${SELCOM_BASE_URL:-https://apigw.selcommobile.com/v1}
      SELCOM_API_KEY:           ${SELCOM_API_KEY:-}
      SELCOM_API_SECRET:        ${SELCOM_API_SECRET:-}
      SELCOM_VENDOR:            ${SELCOM_VENDOR:-}
      MPESA_BASE_URL:           ${MPESA_BASE_URL:-https://openapi.m-pesa.com}
      MPESA_API_KEY:            ${MPESA_API_KEY:-}
      MPESA_PUBLIC_KEY:         ${MPESA_PUBLIC_KEY:-}
      MPESA_SERVICE_PROVIDER_CODE: ${MPESA_SERVICE_PROVIDER_CODE:-}
      STRIPE_SECRET_KEY:        ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:    ${STRIPE_WEBHOOK_SECRET:-}
      PAYMENT_CALLBACK_BASE_URL: ${PAYMENT_CALLBACK_BASE_URL:-https://api.riviwa.com}
      ENVIRONMENT:              ${ENVIRONMENT:-production}
      DEBUG:                    ${DEBUG:-false}
    depends_on:
      kafka-1:
        condition: service_healthy
      subscription_db:
        condition: service_healthy

  subscription_db:
    image: postgres:15-alpine
    container_name: subscription_db
    init: true
    restart: always
    networks: [riviwa-net]
    environment:
      POSTGRES_USER:     ${SUBSCRIPTION_DB_USER:-subscription_admin}
      POSTGRES_PASSWORD: ${SUBSCRIPTION_DB_PASSWORD:-subscription_pass}
      POSTGRES_DB:       ${SUBSCRIPTION_DB_NAME:-subscription_db}
    ports: ["5449:5432"]
    volumes: [subscription_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUBSCRIPTION_DB_USER:-subscription_admin} -d ${SUBSCRIPTION_DB_NAME:-subscription_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  riviwa-net:
    driver: bridge

volumes:
  kafka_1_data:
  kafka_2_data:
  kafka_3_data:
  kafka_4_data:
  auth_db_data:
  feedback_db_data:
  stakeholder_db_data:
  payment_db_data:
  notification_db_data:
  redis_data:
  minio_data:
  certbot_www:
  translation_db_data:
  recommendation_db_data:
  qdrant_data:
  ai_db_data:
  analytics_db_data:
  spark_master_data:
  spark_worker_data:
  spark_checkpoints:
  obsidian_vault_data:
  integration_db_data:
  product_db_data:
  qr_db_data:
  verification_db_data:
  waiting_db_data:
  staff_db_data:
  subscription_db_data:
  certbot_certs:
