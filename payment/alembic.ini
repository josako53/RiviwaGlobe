# ┌─────────────────────────────────────────────────────────────────────────┐
# │  SERVICE  :  payment_service  (source folder: payment/)                 │
# │  API PORT :  8040                                                       │
# │  DATABASE :  payment_db                                                 │
# │  DB PORT  :  5435:5432 (host:container)                                 │
# │  FILE     :  alembic.ini                                                  │
# └─────────────────────────────────────────────────────────────────────────┘
# alembic.ini — payment_service
# ═══════════════════════════════════════════════════════════════════════════════
# Usage
# ──────
#   alembic upgrade head           # apply all pending migrations
#   alembic downgrade -1           # roll back one revision
#   alembic revision --autogenerate -m "add_column_payments_currency"
#   alembic current                # show current revision in DB
#   alembic history --verbose      # full migration history
#
# Connection URL
# ──────────────
#   sqlalchemy.url below is the fallback for local CLI use.
#   In production alembic/env.py overrides it from settings.SYNC_DATABASE_URL.
# ═══════════════════════════════════════════════════════════════════════════════

[alembic]
script_location = alembic
file_template   = %%(year)d-%%(month).2d-%%(day).2d_%%(hour).2d-%%(minute).2d_%%(slug)s
prepend_sys_path = .
timezone        = UTC
sqlalchemy.url  = postgresql+psycopg://payment_user:payment_password@localhost:5432/payment_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level    = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level    = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level    = INFO
handlers =
qualname = alembic

[handler_console]
class     = StreamHandler
args      = (sys.stderr,)
level     = NOTSET
formatter = generic

[formatter_generic]
format  = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
