# ┌─────────────────────────────────────────────────────────────────────────┐
# │  SERVICE  :  notification_service                                       │
# │  API PORT :  8060                                                       │
# │  DATABASE :  notification_db                                            │
# │  DB PORT  :  5437:5432 (host:container)                                 │
# │  FILE     :  alembic.ini                                                │
# └─────────────────────────────────────────────────────────────────────────┘
# alembic.ini
# ═══════════════════════════════════════════════════════════════════════════════
# Alembic configuration for notification_service.
#
# Usage
# ──────
#   # Apply all pending migrations:
#   alembic upgrade head
#
#   # Roll back one revision:
#   alembic downgrade -1
#
#   # Generate a new auto-migration after changing a model:
#   alembic revision --autogenerate -m "add_column_x_to_notifications"
#
#   # Show current revision:
#   alembic current
#
#   # Show migration history:
#   alembic history --verbose
#
# IMPORTANT: Never run alembic directly against production without reviewing
# the generated SQL first. Always test on staging.
# ═══════════════════════════════════════════════════════════════════════════════

[alembic]
# Path to migration scripts — relative to the location of alembic.ini
script_location = alembic

# Add service root to sys.path before env.py loads — enables bare imports
# like `from models.notification import ...` without any sys.path hacks in env.py.
prepend_sys_path = .

# sqlalchemy.url is overridden programmatically in alembic/env.py using
# settings.SYNC_DATABASE_URL so it picks up the correct host/port/credentials
# from environment variables. The value here is a fallback for local dev only.
sqlalchemy.url = postgresql+psycopg://notif_admin:notif_pass_789@localhost:5437/notification_db

# Output encoding used when generating migration scripts
output_encoding = utf-8

# Timezone used for timestamps in generated migration files
timezone = UTC

# ── Logging ───────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
