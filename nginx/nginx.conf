# ── CORS origin whitelist ────────────────────────────────────────────────────
# Maps allowed Origin header values to themselves; unmatched origins → empty string.
map $http_origin $cors_origin {
    default "";
    "http://localhost:5173"          $http_origin;
    "https://riviwa-4b0b9.web.app"  $http_origin;
}

upstream auth_service {
    server riviwa_auth_service:8000;
}
upstream stakeholder_service {
    server stakeholder_service:8070;
}
upstream feedback_service {
    server feedback_service:8090;
}
upstream payment_service {
    server payment_service:8040;
}
upstream notification_service {
    server notification_service:8060;
}
server {
    listen 80;
    server_name api.riviwa.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.riviwa.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/api.riviwa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.riviwa.com/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Docker DNS resolver — required for variable-based proxy_pass
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Request limits
    client_max_body_size 50M;

    # ── CORS — handled here so all services get consistent headers ───────
    # Preflight (OPTIONS) is answered immediately by nginx — never hits backend.
    # Actual requests get the CORS headers added to the proxied response.

    # ── Auth Service (port 8000) ─────────────────────────────────────────
    location /api/v1/auth {
        include /etc/nginx/cors_params;
        proxy_pass http://auth_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/users {
        include /etc/nginx/cors_params;
        proxy_pass http://auth_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/orgs {
        include /etc/nginx/cors_params;
        proxy_pass http://auth_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/admin {
        include /etc/nginx/cors_params;
        proxy_pass http://auth_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/webhooks {
        proxy_pass http://auth_service;
        include /etc/nginx/proxy_params;
    }

    # ── Stakeholder Service (port 8070) ──────────────────────────────────
    location /api/v1/projects {
        include /etc/nginx/cors_params;
        proxy_pass http://stakeholder_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/stakeholders {
        include /etc/nginx/cors_params;
        proxy_pass http://stakeholder_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/activities {
        include /etc/nginx/cors_params;
        proxy_pass http://stakeholder_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/communications {
        include /etc/nginx/cors_params;
        proxy_pass http://stakeholder_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/focal-persons {
        include /etc/nginx/cors_params;
        proxy_pass http://stakeholder_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/reports/stakeholder {
        include /etc/nginx/cors_params;
        proxy_pass http://stakeholder_service/api/v1/reports;
        include /etc/nginx/proxy_params;
    }

    # ── Feedback Service (port 8090) ─────────────────────────────────────
    location /api/v1/feedback {
        include /etc/nginx/cors_params;
        proxy_pass http://feedback_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/categories {
        include /etc/nginx/cors_params;
        proxy_pass http://feedback_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/channels {
        include /etc/nginx/cors_params;
        proxy_pass http://feedback_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/committees {
        include /etc/nginx/cors_params;
        proxy_pass http://feedback_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/pap {
        include /etc/nginx/cors_params;
        proxy_pass http://feedback_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/voice {
        include /etc/nginx/cors_params;
        proxy_pass http://feedback_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/reports {
        include /etc/nginx/cors_params;
        proxy_pass http://feedback_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/my {
        include /etc/nginx/cors_params;
        proxy_pass http://feedback_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/escalation-requests {
        include /etc/nginx/cors_params;
        proxy_pass http://feedback_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/channel-sessions {
        include /etc/nginx/cors_params;
        proxy_pass http://feedback_service;
        include /etc/nginx/proxy_params;
    }

    # ── Payment Service (port 8040) ──────────────────────────────────────
    location /api/v1/payments {
        include /etc/nginx/cors_params;
        proxy_pass http://payment_service;
        include /etc/nginx/proxy_params;
    }
    # Payment provider callbacks — no CORS needed (server-to-server)
    location /api/v1/webhooks/payment {
        proxy_pass http://payment_service/api/v1/webhooks;
        include /etc/nginx/proxy_params;
    }

    # ── Notification Service (port 8060) ────────────────────────────────
    location /api/v1/notifications {
        include /etc/nginx/cors_params;
        proxy_pass http://notification_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/notification-preferences {
        include /etc/nginx/cors_params;
        proxy_pass http://notification_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/devices {
        include /etc/nginx/cors_params;
        proxy_pass http://notification_service;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/templates {
        include /etc/nginx/cors_params;
        proxy_pass http://notification_service;
        include /etc/nginx/proxy_params;
    }
    # Internal service-to-service — no CORS
    location /api/v1/internal {
        proxy_pass http://notification_service;
        include /etc/nginx/proxy_params;
    }
    # Notification provider webhooks — no CORS (server-to-server)
    location /api/v1/webhooks/notifications {
        proxy_pass http://notification_service/api/v1/webhooks;
        include /etc/nginx/proxy_params;
    }

    # ── Health checks ────────────────────────────────────────────────────
    # ── Translation Service (port 8050) ���───────────────────────��────────
    location /api/v1/translate {
        include /etc/nginx/cors_params;
        set $translation_backend http://translation_service:8050;
        proxy_pass $translation_backend;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/languages {
        include /etc/nginx/cors_params;
        set $translation_backend http://translation_service:8050;
        proxy_pass $translation_backend;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/detect {
        include /etc/nginx/cors_params;
        set $translation_backend http://translation_service:8050;
        proxy_pass $translation_backend;
        include /etc/nginx/proxy_params;
    }

    location /health/auth {
        proxy_pass http://auth_service/health;
        include /etc/nginx/proxy_params;
    }
    location /health/stakeholder {
        proxy_pass http://stakeholder_service/health;
        include /etc/nginx/proxy_params;
    }
    location /health/feedback {
        proxy_pass http://feedback_service/health;
        include /etc/nginx/proxy_params;
    }
    location /health/notification {
        proxy_pass http://notification_service/health;
        include /etc/nginx/proxy_params;
    }
    location /health/payment {
        proxy_pass http://payment_service/health;
        include /etc/nginx/proxy_params;
    }
    location /health/translation {
        set $translation_backend http://translation_service:8050;
        proxy_pass $translation_backend/health;
        include /etc/nginx/proxy_params;
    }
    location = /health {
        proxy_pass http://auth_service/health;
        include /etc/nginx/proxy_params;
    }

    # Default — 404
    location / {
        return 404 '{"error": "not_found"}';
        add_header Content-Type application/json;
    }
}
