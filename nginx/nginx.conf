# ── CORS origin whitelist ────────────────────────────────────────────────────
map $http_origin $cors_origin {
    default                                 "";
    "~^http://localhost(:\d+)?$"            $http_origin;
    "~^http://127\.0\.0\.1(:\d+)?$"        $http_origin;
    "~^http://0\.0\.0\.0(:\d+)?$"          $http_origin;
    "https://riviwa-4b0b9.web.app"          $http_origin;
    "https://riviwa.web.app"                $http_origin;
    "https://app.riviwa.com"                $http_origin;
}

server {
    listen 80;
    server_name api.riviwa.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.riviwa.com;

    ssl_certificate     /etc/letsencrypt/live/api.riviwa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.riviwa.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Docker DNS — valid=30s forces re-resolution every 30 s so IP changes
    # after container restarts are picked up without reloading nginx.
    resolver 127.0.0.11 valid=30s ipv6=off;

    client_max_body_size 50M;

    # ── Auth Service (port 8000) ─────────────────────────────────────────
    location /api/v1/auth {
        include /etc/nginx/cors_params;
        set $auth http://riviwa_auth_service:8000;
        proxy_pass $auth;
        include /etc/nginx/proxy_params;
    }
    location /api/v1/users {
        include /etc/nginx/cors_params;
        set $auth http://riviwa_auth_service:8000;
        proxy_pass $auth;
        include /etc/nginx/proxy_params;
    }
