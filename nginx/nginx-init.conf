# Temporary config — used only to obtain the initial Let's Encrypt certificate.
# After certs are obtained, switch to nginx.conf which has the full HTTPS config.
server {
    listen 80;
    server_name api.riviwa.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Riviwa API — awaiting SSL setup';
        add_header Content-Type text/plain;
    }
}
