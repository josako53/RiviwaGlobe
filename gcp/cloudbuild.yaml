      - --timeout=300
      - --set-secrets=ANALYTICS_DATABASE_URL=riviwa-ANALYTICS_DATABASE_URL:latest,FEEDBACK_DATABASE_URL=riviwa-FEEDBACK_DATABASE_URL:latest,KAFKA_BOOTSTRAP_SERVERS=riviwa-KAFKA_BOOTSTRAP_SERVERS:latest,REDIS_URL=riviwa-REDIS_URL:latest,GROQ_API_KEY=riviwa-GROQ_API_KEY:latest,INTERNAL_SERVICE_KEY=riviwa-INTERNAL_SERVICE_KEY:latest
