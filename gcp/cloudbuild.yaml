      - --ingress=all
      - --port=8000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - "--set-env-vars=AUTH_DB_HOST=$_SQL_IP,DB_PORT=5432,AUTH_DB_USER=riviwa_auth_admin,AUTH_DB_NAME=auth_db,REDIS_URL=redis://$_REDIS_IP:6379/0,KAFKA_BOOTSTRAP_SERVERS=$_VM_IP:9092,ALGORITHM=HS256,ENVIRONMENT=staging,DEBUG=false,ADMIN_EMAIL=johnsabaskomba@gmail.com,OTP_SMS_PROVIDER=karibu,KARIBU_APP_KEY=briq_44o9gytxpyu510de,KARIBU_BASE_URL=https://karibu.briq.tz,KARIBU_SENDER_ID=RIVIWA,KARIBU_OTP_TTL_MIN=10,OTP_EMAIL_PROVIDER=smtp,SMTP_HOST=premium33-2.web-hosting.com,SMTP_PORT=465,SMTP_USER=noreply@riviwa.com,SMTP_USE_TLS=True,TWILIO_FROM_NUMBER=+255760696054"
