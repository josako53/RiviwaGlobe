    entrypoint: gcloud
    args:
      - run
      - deploy
      - riviwa-stakeholder
      - --image=$_REGISTRY/riviwa-stakeholder:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --service-account=$_CR_SA
      - --vpc-connector=$_CONNECTOR
      - --vpc-egress=private-ranges-only
      - --memory=512Mi
      - --cpu=1
      - --port=8070
      - --concurrency=80
      - --min-instances=0
      - --max-instances=10
      - --timeout=300
      - --set-secrets=STAKEHOLDER_DATABASE_URL=riviwa-STAKEHOLDER_DATABASE_URL:latest,KAFKA_BOOTSTRAP_SERVERS=riviwa-KAFKA_BOOTSTRAP_SERVERS:latest,REDIS_URL=riviwa-REDIS_URL:latest,INTERNAL_SERVICE_KEY=riviwa-INTERNAL_SERVICE_KEY:latest,SECRET_KEY=riviwa-SECRET_KEY:latest,ALGORITHM=riviwa-ALGORITHM:latest
      - --set-env-vars=APP_V1_STR=/api/v1
      - --allow-unauthenticated
      - --project=$_PROJECT_ID
    waitFor: [push-stakeholder]

  - id: deploy-feedback
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - riviwa-feedback
      - --image=$_REGISTRY/riviwa-feedback:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --service-account=$_CR_SA
      - --vpc-connector=$_CONNECTOR
      - --vpc-egress=private-ranges-only
      - --memory=512Mi
      - --cpu=1
      - --port=8090
      - --concurrency=80
      - --min-instances=0
      - --max-instances=10
      - --timeout=300
      - --set-secrets=FEEDBACK_DATABASE_URL=riviwa-FEEDBACK_DATABASE_URL:latest,KAFKA_BOOTSTRAP_SERVERS=riviwa-KAFKA_BOOTSTRAP_SERVERS:latest,REDIS_URL=riviwa-REDIS_URL:latest,INTERNAL_SERVICE_KEY=riviwa-INTERNAL_SERVICE_KEY:latest,SECRET_KEY=riviwa-SECRET_KEY:latest,ALGORITHM=riviwa-ALGORITHM:latest,MINIO_ENDPOINT=riviwa-MINIO_ENDPOINT:latest,MINIO_ACCESS_KEY=riviwa-MINIO_ACCESS_KEY:latest,MINIO_SECRET_KEY=riviwa-MINIO_SECRET_KEY:latest,OPENAI_API_KEY=riviwa-OPENAI_API_KEY:latest
