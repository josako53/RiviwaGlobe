      - --set-env-vars=INTEGRATION_DB_HOST=$_SQL_IP,INTEGRATION_DB_USER=integration_admin,INTEGRATION_DB_NAME=integration_db,DB_PORT=5432,AUTH_ALGORITHM=HS256,REDIS_URL=redis://$_REDIS_IP:6379/7,RIVIWA_WIDGET_BASE_URL=https://widget.riviwa.com,ENVIRONMENT=production,DEBUG=False
