# ─────────────────────────────────────────────────────────────────────────────
# Riviwa — Cloud Run stage deployment  (region: me-west1)
# Source-of-truth: root@77.237.241.13  /opt/riviwa
#
# GCP infrastructure:
#   Cloud SQL PostgreSQL 15  : 10.247.0.2   (16 isolated databases)
#   Memorystore Redis 7      : 10.49.120.219
#   Compute Engine VM        : 10.10.0.100  (Kafka :9092, Qdrant :6333,
#                                            Ollama :11434, MinIO :9000, Spark)
#   Artifact Registry        : me-west1-docker.pkg.dev/riviwa/riviwa-services
#   VPC Connector            : projects/riviwa/locations/me-west1/connectors/riviwa-connector
#
# One-time Secret Manager setup (run ONCE before first build):
#   printf 'eW8KEbcuo6EVMFTw7c'                           | gcloud secrets create riviwa-ADMIN_PASSWORD          --data-file=- --project=riviwa
#   printf 'Zaburi121-3**'                                 | gcloud secrets create riviwa-SMTP_PASSWORD           --data-file=- --project=riviwa
#   printf 'dd1893286a87d755566fa8036eceb29d'              | gcloud secrets create riviwa-TWILIO_AUTH_TOKEN        --data-file=- --project=riviwa
#   printf '<twilio-account-sid>'                          | gcloud secrets create riviwa-TWILIO_ACCOUNT_SID       --data-file=- --project=riviwa
#   printf '<twilio-verify-service-sid>'                   | gcloud secrets create riviwa-TWILIO_VERIFY_SERVICE_SID --data-file=- --project=riviwa
#   printf 'dfcAFCke0rQOXmGxPak6Nccm1hc_wpuPIYkawm0Pmhc' | gcloud secrets create riviwa-KARIBU_API_KEY           --data-file=- --project=riviwa
#   printf 'ZEJy3NmTGQVxtSUoGe0PuKFijEbvMdas'             | gcloud secrets create riviwa-MINIO_SECRET_KEY         --data-file=- --project=riviwa
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: me-west1
  _AR: me-west1-docker.pkg.dev/riviwa/riviwa-services
  _SQL_IP: "10.247.0.2"
  _REDIS_IP: "10.49.120.219"
  _VM_IP: "10.10.0.100"
  _VPC: projects/riviwa/locations/me-west1/connectors/riviwa-connector
  _SA: riviwa-cloudrun@riviwa.iam.gserviceaccount.com

steps:

# ══════════════════════════════════════════════════════════════════════════════
# BUILD  (all 16 services in parallel)
# ══════════════════════════════════════════════════════════════════════════════
  - id: build-auth
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-auth-service:$COMMIT_SHA", ./riviwa_auth_service]
    waitFor: ['-']

  - id: build-stakeholder
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-stakeholder-service:$COMMIT_SHA", ./stakeholder_service]
    waitFor: ['-']

  - id: build-feedback
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-feedback-service:$COMMIT_SHA", ./feedback_service]
    waitFor: ['-']

  - id: build-payment
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-payment-service:$COMMIT_SHA", ./payment]
    waitFor: ['-']

  - id: build-notification
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-notification-service:$COMMIT_SHA", ./notification_service]
    waitFor: ['-']

  - id: build-translation
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-translation-service:$COMMIT_SHA", ./translation_service]
    waitFor: [push-auth, push-stakeholder, push-feedback, push-payment, push-notification]

  - id: build-recommendation
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-recommendation-service:$COMMIT_SHA", ./recommendation_service]
    waitFor: [push-auth, push-stakeholder, push-feedback, push-payment, push-notification]

  - id: build-ai
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-ai-service:$COMMIT_SHA", ./ai_service]
    waitFor: [push-auth, push-stakeholder, push-feedback, push-payment, push-notification]

  - id: build-analytics
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-analytics-service:$COMMIT_SHA", ./analytics_service]
    waitFor: ['-']

  - id: build-integration
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-integration-service:$COMMIT_SHA", ./integration_service]
    waitFor: ['-']

  - id: build-product
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-product-service:$COMMIT_SHA", ./product_service]
    waitFor: ['-']

  - id: build-qr
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-qr-service:$COMMIT_SHA", ./qr_service]
    waitFor: ['-']

  - id: build-verification
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-verification-service:$COMMIT_SHA", ./verification_service]
    waitFor: ['-']

  - id: build-waiting
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-waiting-service:$COMMIT_SHA", ./waiting_service]
    waitFor: ['-']

  - id: build-staff
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-staff-service:$COMMIT_SHA", ./staff_service]
    waitFor: ['-']

  - id: build-subscription
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_AR/riviwa-subscription-service:$COMMIT_SHA", ./subscription_service]
    waitFor: ['-']

# ══════════════════════════════════════════════════════════════════════════════
# PUSH
# ══════════════════════════════════════════════════════════════════════════════
  - id: push-auth
    name: gcr.io/cloud-builders/docker
    args: [push, "$_AR/riviwa-auth-service:$COMMIT_SHA"]
    waitFor: [build-auth]

  - id: push-stakeholder
