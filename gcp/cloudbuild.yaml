    waitFor: [build-stakeholder]

  - id: push-feedback
    name: gcr.io/cloud-builders/docker
    args: [push, "$_AR/riviwa-feedback-service:$COMMIT_SHA"]
    waitFor: [build-feedback]

  - id: push-payment
    name: gcr.io/cloud-builders/docker
    args: [push, "$_AR/riviwa-payment-service:$COMMIT_SHA"]
