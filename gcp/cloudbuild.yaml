    args: [push, "$_AR/riviwa-analytics-service:$COMMIT_SHA"]
    waitFor: [build-analytics]

  - id: push-integration
    name: gcr.io/cloud-builders/docker
    args: [push, "$_AR/riviwa-integration-service:$COMMIT_SHA"]
    waitFor: [build-integration]

  - id: push-product
    name: gcr.io/cloud-builders/docker
    args: [push, "$_AR/riviwa-product-service:$COMMIT_SHA"]
    waitFor: [build-product]

  - id: push-qr
    name: gcr.io/cloud-builders/docker
    args: [push, "$_AR/riviwa-qr-service:$COMMIT_SHA"]
    waitFor: [build-qr]

  - id: push-verification
    name: gcr.io/cloud-builders/docker
    args: [push, "$_AR/riviwa-verification-service:$COMMIT_SHA"]
    waitFor: [build-verification]

  - id: push-waiting
    name: gcr.io/cloud-builders/docker
    args: [push, "$_AR/riviwa-waiting-service:$COMMIT_SHA"]
    waitFor: [build-waiting]

  - id: push-staff
    name: gcr.io/cloud-builders/docker
    args: [push, "$_AR/riviwa-staff-service:$COMMIT_SHA"]
    waitFor: [build-staff]

  - id: push-subscription
    name: gcr.io/cloud-builders/docker
    args: [push, "$_AR/riviwa-subscription-service:$COMMIT_SHA"]
    waitFor: [build-subscription]

