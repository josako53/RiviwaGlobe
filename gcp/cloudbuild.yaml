  - id: deploy-waiting
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - riviwa-waiting
      - --image=$_REGISTRY/riviwa-waiting:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --service-account=$_CR_SA
      - --vpc-connector=$_CONNECTOR
      - --vpc-egress=private-ranges-only
      - --memory=512Mi
      - --cpu=1
      - --port=8130
      - --concurrency=80
      - --min-instances=0
