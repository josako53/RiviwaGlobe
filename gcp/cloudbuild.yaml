# =============================================================================
# Cloud Build CI/CD Pipeline
# Triggers on push to main branch.
# Builds all service images in parallel, then deploys to Cloud Run.
# =============================================================================
substitutions:
  _REGION: me-west1
  _PROJECT_ID: riviwa
  _REGISTRY: me-west1-docker.pkg.dev/riviwa/riviwa-services
  _CONNECTOR: projects/riviwa/locations/me-west1/connectors/riviwa-connector
  _CR_SA: riviwa-cloudrun@riviwa.iam.gserviceaccount.com

options:
  machineType: E2_HIGHCPU_32
  diskSizeGb: 400
  logging: LEGACY
  substitution_option: ALLOW_LOOSE

timeout: 3600s  # 1 hour max

steps:
  # ── Build all images in parallel (waitFor: ['-'] = start immediately) ──────

  - id: build-auth
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-auth:$COMMIT_SHA", ./riviwa_auth_service]
    waitFor: ["-"]

  - id: build-payment
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-payment:$COMMIT_SHA", ./payment]
    waitFor: ["-"]

  - id: build-notification
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-notification:$COMMIT_SHA", ./notification_service]
    waitFor: ["-"]

  - id: build-stakeholder
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-stakeholder:$COMMIT_SHA", ./stakeholder_service]
    waitFor: ["-"]

  - id: build-feedback
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-feedback:$COMMIT_SHA", ./feedback_service]
    waitFor: ["-"]

  - id: build-recommendation
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-recommendation:$COMMIT_SHA", ./recommendation_service]
    waitFor: ["-"]

  - id: build-ai
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-ai:$COMMIT_SHA", ./ai_service]
    waitFor: ["-"]

  - id: build-analytics
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-analytics:$COMMIT_SHA", ./analytics_service]
    waitFor: ["-"]

  - id: build-integration
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-integration:$COMMIT_SHA", ./integration_service]
    waitFor: ["-"]

  - id: build-product
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-product:$COMMIT_SHA", ./product_service]
    waitFor: ["-"]

  - id: build-qr
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-qr:$COMMIT_SHA", ./qr_service]
    waitFor: ["-"]

  - id: build-verification
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-verification:$COMMIT_SHA", ./verification_service]
    waitFor: ["-"]

  - id: build-waiting
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-waiting:$COMMIT_SHA", ./waiting_service]
    waitFor: ["-"]

  - id: build-staff
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-staff:$COMMIT_SHA", ./staff_service]
    waitFor: ["-"]

  - id: build-subscription
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "$_REGISTRY/riviwa-subscription:$COMMIT_SHA", ./subscription_service]
    waitFor: ["-"]

  # ── Prune dangling layers after all builds complete (frees disk) ────────────
  - id: prune-layers
    name: gcr.io/cloud-builders/docker
    args: ['image', 'prune', '-f']
    waitFor:
      - build-auth
      - build-payment
      - build-notification
      - build-stakeholder
      - build-feedback
      - build-recommendation
      - build-ai
      - build-analytics
      - build-integration
      - build-product
      - build-qr
      - build-verification
      - build-waiting
      - build-staff
      - build-subscription

  # ── Verify images exist before pushing (diagnostic) ──────────────────────────
  - id: verify-images
    name: gcr.io/cloud-builders/docker
    args: ['images', '--filter', 'reference=$_REGISTRY/*:$COMMIT_SHA']
    waitFor: [prune-layers]

  # ── Push images sequentially — native docker args, no entrypoint override ──
  # Cloud Build auto-configures Artifact Registry auth for this SA.
  # Sequential chain prevents bandwidth saturation from recommendation (~2GB).

  - id: push-auth
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-auth:$COMMIT_SHA']
    waitFor: [verify-images]
    timeout: 900s

  - id: push-payment
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-payment:$COMMIT_SHA']
    waitFor: [push-auth]
    timeout: 900s

  - id: push-notification
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-notification:$COMMIT_SHA']
    waitFor: [push-payment]
    timeout: 900s

  - id: push-stakeholder
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-stakeholder:$COMMIT_SHA']
    waitFor: [push-notification]
    timeout: 900s

  - id: push-feedback
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-feedback:$COMMIT_SHA']
    waitFor: [push-stakeholder]
    timeout: 900s

  - id: push-recommendation
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-recommendation:$COMMIT_SHA']
    waitFor: [push-feedback]
    timeout: 1800s

  - id: push-ai
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-ai:$COMMIT_SHA']
    waitFor: [push-recommendation]
    timeout: 900s

  - id: push-analytics
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-analytics:$COMMIT_SHA']
    waitFor: [push-ai]
    timeout: 900s

  - id: push-integration
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-integration:$COMMIT_SHA']
    waitFor: [push-analytics]
    timeout: 900s

  - id: push-product
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-product:$COMMIT_SHA']
    waitFor: [push-integration]
    timeout: 900s

  - id: push-qr
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-qr:$COMMIT_SHA']
    waitFor: [push-product]
    timeout: 900s

  - id: push-verification
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-verification:$COMMIT_SHA']
    waitFor: [push-qr]
    timeout: 900s

  - id: push-waiting
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-waiting:$COMMIT_SHA']
    waitFor: [push-verification]
    timeout: 900s

  - id: push-staff
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-staff:$COMMIT_SHA']
    waitFor: [push-waiting]
    timeout: 900s

  - id: push-subscription
    name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGISTRY/riviwa-subscription:$COMMIT_SHA']
    waitFor: [push-staff]
    timeout: 900s

  # ── Deploy to Cloud Run (wait for push, run in parallel) ──────────────────

  - id: deploy-auth
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - riviwa-auth
      - --image=$_REGISTRY/riviwa-auth:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --service-account=$_CR_SA
      - --vpc-connector=$_CONNECTOR
      - --vpc-egress=private-ranges-only
      - --memory=512Mi
      - --cpu=1
      - --port=8000
      - --concurrency=80
      - --min-instances=1
      - --max-instances=10
      - --timeout=300
      - --set-secrets=SECRET_KEY=riviwa-SECRET_KEY:latest,ALGORITHM=riviwa-ALGORITHM:latest,KAFKA_BOOTSTRAP_SERVERS=riviwa-KAFKA_BOOTSTRAP_SERVERS:latest,INTERNAL_SERVICE_KEY=riviwa-INTERNAL_SERVICE_KEY:latest,AUTH_DATABASE_URL=riviwa-AUTH_DATABASE_URL:latest,REDIS_URL=riviwa-REDIS_URL:latest,TWILIO_ACCOUNT_SID=riviwa-TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=riviwa-TWILIO_AUTH_TOKEN:latest,TWILIO_VERIFY_SERVICE_SID=riviwa-TWILIO_VERIFY_SERVICE_SID:latest,MINIO_ENDPOINT=riviwa-MINIO_ENDPOINT:latest,MINIO_ACCESS_KEY=riviwa-MINIO_ACCESS_KEY:latest,MINIO_SECRET_KEY=riviwa-MINIO_SECRET_KEY:latest
      - --set-env-vars=APP_V1_STR=/api/v1,ENVIRONMENT=production
      - --allow-unauthenticated
      - --project=$_PROJECT_ID
    waitFor: [push-auth]

  - id: deploy-payment
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - riviwa-payment
      - --image=$_REGISTRY/riviwa-payment:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --service-account=$_CR_SA
      - --vpc-connector=$_CONNECTOR
      - --vpc-egress=private-ranges-only
      - --memory=512Mi
      - --cpu=1
      - --port=8040
      - --concurrency=80
      - --min-instances=0
      - --max-instances=10
      - --timeout=300
      - --set-secrets=PAYMENT_DATABASE_URL=riviwa-PAYMENT_DATABASE_URL:latest,KAFKA_BOOTSTRAP_SERVERS=riviwa-KAFKA_BOOTSTRAP_SERVERS:latest,INTERNAL_SERVICE_KEY=riviwa-INTERNAL_SERVICE_KEY:latest,AZAMPAY_CLIENT_ID=riviwa-AZAMPAY_CLIENT_ID:latest,AZAMPAY_CLIENT_SECRET=riviwa-AZAMPAY_CLIENT_SECRET:latest,SELCOM_API_KEY=riviwa-SELCOM_API_KEY:latest,SELCOM_API_SECRET=riviwa-SELCOM_API_SECRET:latest,MPESA_API_KEY=riviwa-MPESA_API_KEY:latest,STRIPE_SECRET_KEY=riviwa-STRIPE_SECRET_KEY:latest
