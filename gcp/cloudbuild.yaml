      - --set-env-vars=AUTH_ALGORITHM=HS256,KAFKA_BOOTSTRAP_SERVERS=$_VM_IP:9092,$_VM_IP:9093,$_VM_IP:9094,$_VM_IP:9095,PAYMENT_CALLBACK_BASE_URL=https://api.riviwa.com,AZAMPAY_APP_NAME=Riviwa,AZAMPAY_BASE_URL=https://authenticator.azampay.co.tz,AZAMPAY_CHECKOUT_URL=https://checkout.azampay.co.tz,SELCOM_BASE_URL=https://apigw.selcommobile.com/v1,MPESA_BASE_URL=https://openapi.m-pesa.com,PAYPAL_SANDBOX=true,AIRTEL_SANDBOX=true,YAS_SANDBOX=true,ENVIRONMENT=production,DEBUG=False
      - --allow-unauthenticated
