      - riviwa-integration
      - --image=$_REGISTRY/riviwa-integration:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --service-account=$_CR_SA
      - --vpc-connector=$_CONNECTOR
      - --vpc-egress=private-ranges-only
