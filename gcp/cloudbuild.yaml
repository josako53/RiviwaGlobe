      - --set-secrets=AI_DATABASE_URL=riviwa-AI_DATABASE_URL:latest,KAFKA_BOOTSTRAP_SERVERS=riviwa-KAFKA_BOOTSTRAP_SERVERS:latest,REDIS_URL=riviwa-REDIS_URL:latest,INTERNAL_SERVICE_KEY=riviwa-INTERNAL_SERVICE_KEY:latest,QDRANT_HOST=riviwa-QDRANT_HOST:latest,QDRANT_PORT=riviwa-QDRANT_PORT:latest,OLLAMA_BASE_URL=riviwa-OLLAMA_BASE_URL:latest,GROQ_API_KEY=riviwa-GROQ_API_KEY:latest,WHATSAPP_ACCESS_TOKEN=riviwa-WHATSAPP_ACCESS_TOKEN:latest,WHATSAPP_VERIFY_TOKEN=riviwa-WHATSAPP_VERIFY_TOKEN:latest,MINIO_ENDPOINT=riviwa-MINIO_ENDPOINT:latest,MINIO_ACCESS_KEY=riviwa-MINIO_ACCESS_KEY:latest,MINIO_SECRET_KEY=riviwa-MINIO_SECRET_KEY:latest
      - --set-env-vars=APP_V1_STR=/api/v1
      - --allow-unauthenticated
      - --project=$_PROJECT_ID
