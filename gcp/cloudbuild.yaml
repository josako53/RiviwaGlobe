      - --vpc-egress=private-ranges-only
      - --memory=512Mi
      - --cpu=1
      - --port=8060
      - --concurrency=80
      - --min-instances=0
      - --max-instances=10
      - --timeout=300
      - --set-secrets=NOTIFICATION_DATABASE_URL=riviwa-NOTIFICATION_DATABASE_URL:latest,KAFKA_BOOTSTRAP_SERVERS=riviwa-KAFKA_BOOTSTRAP_SERVERS:latest,REDIS_URL=riviwa-REDIS_URL:latest,SENDGRID_API_KEY=riviwa-SENDGRID_API_KEY:latest,TWILIO_ACCOUNT_SID=riviwa-TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=riviwa-TWILIO_AUTH_TOKEN:latest,AT_API_KEY=riviwa-AT_API_KEY:latest,WHATSAPP_ACCESS_TOKEN=riviwa-WHATSAPP_ACCESS_TOKEN:latest,FCM_SERVER_KEY=riviwa-FCM_SERVER_KEY:latest
      - --set-env-vars=APP_V1_STR=/api/v1
      - --allow-unauthenticated
      - --project=$_PROJECT_ID
    waitFor: [push-notification]

  - id: deploy-stakeholder
